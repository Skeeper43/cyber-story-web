<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | NUS Productions</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d0d17;
color:white;
}

header{
background:#7c3aed;
padding:25px;
text-align:center;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.grid img{
width:100%;
border-radius:15px;
transition:.3s;
}

.grid img:hover{
transform:scale(1.05);
}

a{
display:inline-block;
margin-top:30px;
background:#7c3aed;
padding:10px 20px;
color:white;
text-decoration:none;
border-radius:10px;
}
</style>

</head>

<body>

<header>
<h1>Gallery</h1>
</header>

<div class="container">

<div class="grid">

<img src="../characters/cyber.png">
<img src="../characters/kael.png">
<img src="../characters/ryden.png">
<img src="../characters/sylva.png">
<img src="../characters/shadow.png">
<img src="../characters/thanero.png">

</div>

<a href="../index.html">⬅ Back to Home</a>

</div>

</body>
</html>
